{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="/admin" class="back-link">← Назад в админку</a>
        <span class="panel__eyebrow">Карточки</span>
        <h1>{{ page_title }}</h1>
    </div>
</div>

<section class="panel admin-form-panel">
    {% if message %}
    <div class="alert alert--error">{{ message }}</div>
    {% endif %}

    <form action="{{ form_action }}" method="post" class="form-stack">
        <div class="form-grid">
            <label>
                Раздел
                <select name="category_id" required {% if not categories %}disabled{% endif %}>
                    <option value="">Выберите раздел</option>
                    {% for category in categories %}
                    <option
                        value="{{ category.id }}"
                        {% if form_data.category_id|string == category.id|string %}selected{% endif %}
                    >
                        {{ category.icon }} {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </label>

            <label>
                Цена
                <input type="number" step="0.01" min="0.01" name="price" value="{{ form_data.price }}" required>
            </label>
        </div>

        <div class="form-grid">
            <label>
                Название
                <input type="text" name="name" value="{{ form_data.name }}" required>
            </label>

            <label>
                Slug
                <input type="text" name="slug" value="{{ form_data.slug }}" placeholder="roll-set" required>
            </label>
        </div>

        <label>
            Ссылка на изображение
            <input type="text" name="image" value="{{ form_data.image }}" placeholder="/static/img/offer.png">
        </label>

        <label>
            Описание
            <textarea name="description" rows="6" placeholder="Текст карточки">{{ form_data.description }}</textarea>
        </label>

        <label class="checkbox-field">
            <input type="checkbox" name="is_active" {% if form_data.is_active %}checked{% endif %}>
            <span>Карточка активна и видна в каталоге</span>
        </label>

        <div class="form-actions">
            <button type="submit" class="btn" {% if not categories %}disabled{% endif %}>{{ submit_label }}</button>
            <a href="/admin" class="btn btn--ghost">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
